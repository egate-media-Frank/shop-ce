services:
  db:
    profiles: [db]
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${O3SHOP_CONF_DBROOT}
      MYSQL_DATABASE: ${O3SHOP_CONF_DBNAME}
      MYSQL_USER: ${O3SHOP_CONF_DBUSER}
      MYSQL_PASSWORD: ${O3SHOP_CONF_DBPWD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      default:
      o3shop-shared:
        aliases:
          - db

  shop:
    build:
      dockerfile: Dockerfile
    volumes:
      - ./../:/var/www/html
    environment:
      PATH: /var/www/html/vendor/o3-shop/testing-library/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      TZ: Europe/Berlin
      # Scan the compiled-in default conf.d (leading ':') PLUS the bind-mounted
      # xdebug dir, so ./docker.sh xdebug on|off takes effect without a rebuild.
      PHP_INI_SCAN_DIR: ":/var/www/html/docker/xdebug"
    ports:
      - "${O3SHOP_PORT_HTTP:-8080}:80"
    working_dir: /var/www/html
    healthcheck:
      test: [ "CMD", "test", "!", "-f", "/tmp/o3setup-running" ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 5s
    networks:
      - default
      - o3shop-shared

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    volumes:
      - ./mailpit/data:/data
    ports:
      - "${O3SHOP_PORT_MAILPIT:-8025}:8025"
      - "${O3SHOP_PORT_SMTP:-1025}:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - default
      - o3shop-shared

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${O3SHOP_PORT_ADMINER:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      MYSQL_ROOT_PASSWORD: ${O3SHOP_CONF_DBROOT}
      MYSQL_DATABASE: ${O3SHOP_CONF_DBNAME}
      MYSQL_USER: ${O3SHOP_CONF_DBUSER}
      MYSQL_PASSWORD: ${O3SHOP_CONF_DBPWD}
    networks:
      - default
      - o3shop-shared

volumes:
  db_data:

networks:
  default:
  o3shop-shared:
    external: true
    name: o3shop-shared
